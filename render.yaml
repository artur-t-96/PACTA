# Render deployment configuration
# https://render.com/docs/blueprint-spec

databases:
  - name: pacta-db
    plan: free
    databaseName: pacta
    user: pacta

services:
  - type: web
    name: pacta
    env: docker
    plan: free
    healthCheckPath: /login
    disk:
      name: pacta-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: LOGIN
        value: rekruter
      - key: PASSWORD
        sync: false  # Set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: CEIDG_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: pacta-db
          property: connectionString
      - key: TEMPLATES_DIR
        value: /var/data/templates
      - key: GENERATED_DIR
        value: /var/data/generated
