{% extends "base.html" %}

{% block title %}Logowanie - {{ app_name }}{% endblock %}

{% block body %}
<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <div class="logo">🏛️</div>
            <h1>PACTA</h1>
            <p class="subtitle">Partner And Contract Transaction Assistant</p>
        </div>
        
        {% if error %}
        <div class="error-message">
            ⚠️ {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/login" class="login-form">
            <div class="form-group">
                <label for="login">Login</label>
                <input type="text" id="login" name="login" required placeholder="Wprowadź login" autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Hasło</label>
                <input type="password" id="password" name="password" required placeholder="Wprowadź hasło" autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">
                Zaloguj się
            </button>
        </form>
        
        <div class="login-footer">
            <p>Generator umów B2B dla B2B.net S.A.</p>
        </div>
    </div>
</div>
{% endblock %}
